<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Players</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1 class="text-center fw-bold">Player Lobby</h1>

    <h3>
      <i class="bi bi-person-fill"></i>
      <span class="header-player-count">1</span>
    </h3>
    <div class="container mt-4 text-center fw-bold">
      <table class="table table-bordered table-centered">
        <thead>
          <th scope="col">#</th>
          <th scope="col">Nickname</th>
          <th scope="col">Add Player</th>
          <th scope="col">Remove Player</th>
        </thead>
        <tbody id="table-players">
          <tr>
            <th scope="row" class="player-number">1</th>
            <td contenteditable="true" class="player-nickname"></td>
            <td class="add-hover"><i class="bi bi-person-plus-fill"></i></td>
            <td class="delete-hover"><i class="bi bi-person-x-fill"></i></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="container text-center fw-bold">
      <a
        href="../game-start/start.html"
        class="btn btn-primary btn-lg"
        id="btn-start"
        role="button"
        >Start</a
      >
      <a
        href="../select-subject/subject.html"
        class="btn btn-secondary btn-lg"
        id="btn-next"
        role="button"
        >Next</a
      >
    </div>
    <script src="index.js"></script>
  </body>
</html>
