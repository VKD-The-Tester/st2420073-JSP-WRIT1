<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="start.css" />
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh"
    >
      <div class="card shadow-lg m-4" style="width: 30rem"></div>
      <div class="container shadow-lg p-3 custom-container">
        <h1 class="text-center fw-bold" id="current-player">
          Player #: John Doe
        </h1>
        <br />
        <h2 class="text-center fw-semibold" id="question-index">Question #</h2>
        <br />
        <h4 class="text-center fw-bold" id="question-text">
          What is the meaning of life?
        </h4>
      </div>

      <div class="container p-3">
        <br />
        <h2 class="text-left fw-bold">Timer: <span id="timer">60</span></h2>
        <h2 class="text-left fw-bold">Points: <span id="points">10</span></h2>
      </div>

      <div
        class="d-flex flex-column justify-content-end pb-3"
        style="height: 100vh"
      >
        <div>
          <div style="grid-template-columns: 1fr 1fr" class="d-grid gap-3">
            <button
              class="btn btn-danger btn-lg w-100 fw-bold"
              style="height: 90px"
              data-index="0"
            >
              <i class="bi bi-triangle-fill"></i>
              <span class="btn-option">Option A</span>
            </button>
            <button
              class="btn btn-info btn-lg w-100 fw-bold"
              style="height: 90px"
              data-index="1"
            >
              <i class="bi bi-diamond-fill"></i>
              <span class="btn-option">Option B</span>
            </button>
            <button
              class="btn btn-warning btn-lg w-100 fw-bold"
              style="height: 90px"
              data-index="2"
            >
              <i class="bi bi-circle-fill"></i>
              <span class="btn-option">Option C</span>
            </button>
            <button
              class="btn btn-success btn-lg w-100 fw-bold"
              style="height: 90px"
              data-index="3"
            >
              <i class="bi bi-square-fill"></i>
              <span class="btn-option">Option D</span>
            </button>
          </div>
        </div>
      </div>

      <div class="container p-3">
        <button
          class="btn btn-primary btn-lg fw-bold btn-position"
          id="btn-submit"
        >
          Submit
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
